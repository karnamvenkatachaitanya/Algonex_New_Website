name: CI

on:
  push:
    branches: [main, stack-page]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    # Note: tests use SQLite (config.settings.testing), no Postgres service needed
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: algonex-backend/requirements.txt

      - name: Install dependencies
        run: |
          cd algonex-backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.testing
          DB_ENGINE: sqlite
        run: |
          cd algonex-backend
          python -m pytest -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: algonex-frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd algonex-frontend
          npm ci

      - name: Lint
        run: |
          cd algonex-frontend
          npm run lint

      - name: Build
        run: |
          cd algonex-frontend
          npm run build
