version: "3.9"

# Development override — run with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Or just use the Makefile: make dev

services:
  backend:
    build: ./algonex-backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    volumes:
      - ./algonex-backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./algonex-frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./algonex-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: algonex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # No nginx in dev — access frontend at :5173, backend at :8000 directly
  nginx:
    profiles:
      - disabled
