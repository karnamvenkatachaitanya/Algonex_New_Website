services:
  backend:
    image: ghcr.io/${GITHUB_REPO:-algonex}/backend:${IMAGE_TAG:-latest}
    build: ./algonex-backend
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      - db
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend-build:
    image: ghcr.io/${GITHUB_REPO:-algonex}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./algonex-frontend
      target: prod
      args:
        VITE_API_URL: /api/v1
    volumes:
      - frontend_build:/app/dist
    restart: "no"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_build:/srv/frontend:ro
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - STAGING_DOMAIN=${STAGING_DOMAIN:-}
    depends_on:
      - backend
      - frontend-build
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-algonex}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  media_data:
  static_data:
  frontend_build:
  caddy_data:
  caddy_config:
